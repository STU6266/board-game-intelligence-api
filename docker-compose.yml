services:
  db:
    image: postgres:16
    container_name: board_game_intelligence_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: board_games
      POSTGRES_USER: boardgame_user
      POSTGRES_PASSWORD: boardgame_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:


